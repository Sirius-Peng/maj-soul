appId: com.siriuspeng.majsoulreviewassistant
productName: MajSoul Review Assistant
directories:
  output: release
files:
  - "src/**/*"
  - "assets/**/*"
  - "scripts/**/*"
  - "node_modules/**/*"
  - "package.json"
  - "!**/*.md"
  - "!**/.DS_Store"
asar: true
npmRebuild: false
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
